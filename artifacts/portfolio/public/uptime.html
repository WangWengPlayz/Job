<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Uptime Check</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f0fdf4;
      color: #166534;
    }
    .card {
      text-align: center;
      padding: 2rem 3rem;
      border-radius: 1rem;
      border: 1px solid #bbf7d0;
      background: #fff;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .dot {
      width: 14px;
      height: 14px;
      background: #22c55e;
      border-radius: 50%;
      display: inline-block;
      margin-right: 8px;
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }
    h1 { margin: 0 0 0.5rem; font-size: 1.5rem; }
    p { margin: 0; font-size: 0.9rem; color: #4ade80; }
  </style>
</head>
<body>
  <div class="card">
    <div>
      <span class="dot"></span>
      <h1 style="display:inline">OK</h1>
    </div>
    <p id="ts"></p>
  </div>
  <script>
    document.getElementById('ts').textContent =
      'Last checked: ' + new Date().toUTCString();
  </script>
</body>
</html>
