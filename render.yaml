services:
  - type: web
    name: mart-labaco-portfolio
    env: static
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @workspace/portfolio run build
    staticPublishPath: artifacts/portfolio/dist/public
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_ENV
        value: production
